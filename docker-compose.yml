services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroimagen-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroimagen-worker
    command: python -m worker.rq_worker
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: neuroimagen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
